name: Refresh data

# 결과·Elo·예측 스냅샷을 갱신하고, named 마감배당을 closing_odds.csv 에 누적 보존한다.
# (채점용 고정본 group_stage_predictions.csv 는 predict.py 가드가 사후 수정을 막는다.)
# 같은 레포 push 라 GITHUB_TOKEN 만으로 동작.

on:
  schedule:
    - cron: "30 */6 * * *" # 6시간마다 (UTC), 웹 워크플로와 30분 오프셋
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: refresh-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline + capture closing odds
        run: python run_pipeline.py --update

      - name: Commit & push if changed
        run: |
          git config user.name "wc2026-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data
          if git diff --staged --quiet; then
            echo "변경 없음 — 커밋 생략"
          else
            git commit -m "chore: 데이터/예측/마감배당 자동 갱신 ($(date -u +%Y-%m-%dT%H:%MZ))"
            git push
          fi
